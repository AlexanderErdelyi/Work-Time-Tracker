<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generate PWA Icons</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .preview {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .preview > div {
            text-align: center;
        }
        canvas {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            background: #f9fafb;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #2563eb;
        }
    </style>
</head>
<body>
    <h1>Timekeeper PWA Icon Generator</h1>
    <p>Modern, professional icons with gradient background and polished clock design. Click the buttons below to download each icon.</p>
    
    <div class="preview">
        <div>
            <h3>192x192</h3>
            <canvas id="icon192" width="192" height="192"></canvas>
            <br>
            <button onclick="downloadIcon('icon192', 'icon-192x192.png')">Download</button>
        </div>
        <div>
            <h3>512x512</h3>
            <canvas id="icon512" width="512" height="512"></canvas>
            <br>
            <button onclick="downloadIcon('icon512', 'icon-512x512.png')">Download</button>
        </div>
    </div>

    <div class="preview">
        <div>
            <h3>192x192 Maskable</h3>
            <canvas id="icon192m" width="192" height="192"></canvas>
            <br>
            <button onclick="downloadIcon('icon192m', 'icon-192x192-maskable.png')">Download</button>
        </div>
        <div>
            <h3>512x512 Maskable</h3>
            <canvas id="icon512m" width="512" height="512"></canvas>
            <br>
            <button onclick="downloadIcon('icon512m', 'icon-512x512-maskable.png')">Download</button>
        </div>
    </div>

    <button onclick="downloadAll()" style="background: #10b981; font-size: 16px; padding: 15px 30px;">Download All Icons</button>

    <script>
        // Polyfill for roundRect if not available
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, width, height, radius) {
                this.moveTo(x + radius, y);
                this.lineTo(x + width - radius, y);
                this.quadraticCurveTo(x + width, y, x + width, y + radius);
                this.lineTo(x + width, y + height - radius);
                this.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
                this.lineTo(x + radius, y + height);
                this.quadraticCurveTo(x, y + height, x, y + height - radius);
                this.lineTo(x, y + radius);
                this.quadraticCurveTo(x, y, x + radius, y);
                this.closePath();
            };
        }

        function drawIcon(canvasId, size, isMaskable) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, size, size);
            
            const centerX = size / 2;
            const centerY = size / 2;
            
            // Safe zone for maskable icons
            const padding = isMaskable ? size * 0.1 : 0;
            const iconSize = size - (padding * 2);
            const iconRadius = iconSize / 2;
            
            // Modern gradient background
            const gradient = ctx.createLinearGradient(padding, padding, size - padding, size - padding);
            gradient.addColorStop(0, '#6366f1'); // Indigo 500
            gradient.addColorStop(0.5, '#3b82f6'); // Blue 500
            gradient.addColorStop(1, '#2563eb'); // Blue 600
            
            // Draw rounded square background
            const cornerRadius = iconSize * 0.18;
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.roundRect(padding, padding, iconSize, iconSize, cornerRadius);
            ctx.fill();
            
            // Add subtle inner shadow effect
            ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowBlur = size * 0.02;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = size * 0.01;
            
            // Draw clock circle background (lighter)
            const clockRadius = iconRadius * 0.55;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath();
            ctx.arc(centerX, centerY, clockRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // Reset shadow
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;
            
            // Draw clock face with tick marks
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.02;
            ctx.lineCap = 'round';
            
            // 12 tick marks
            for (let i = 0; i < 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const isHour = i % 3 === 0;
                const tickLength = isHour ? clockRadius * 0.15 : clockRadius * 0.08;
                const tickWidth = isHour ? size * 0.025 : size * 0.015;
                const tickStart = clockRadius * 0.85;
                
                ctx.lineWidth = tickWidth;
                ctx.beginPath();
                ctx.moveTo(
                    centerX + Math.cos(angle) * tickStart,
                    centerY + Math.sin(angle) * tickStart
                );
                ctx.lineTo(
                    centerX + Math.cos(angle) * (tickStart - tickLength),
                    centerY + Math.sin(angle) * (tickStart - tickLength)
                );
                ctx.stroke();
            }
            
            // Draw clock hands with shadow
            ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
            ctx.shadowBlur = size * 0.015;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = size * 0.008;
            
            // Hour hand (pointing to 10)
            const hourAngle = (300 - 90) * Math.PI / 180;
            const hourLength = clockRadius * 0.45;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = size * 0.045;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(
                centerX + Math.cos(hourAngle) * hourLength,
                centerY + Math.sin(hourAngle) * hourLength
            );
            ctx.stroke();
            
            // Minute hand (pointing to 2)
            const minuteAngle = (60 - 90) * Math.PI / 180;
            const minuteLength = clockRadius * 0.65;
            ctx.lineWidth = size * 0.035;
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(
                centerX + Math.cos(minuteAngle) * minuteLength,
                centerY + Math.sin(minuteAngle) * minuteLength
            );
            ctx.stroke();
            
            // Center dot
            ctx.shadowBlur = size * 0.02;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(centerX, centerY, size * 0.035, 0, Math.PI * 2);
            ctx.fill();
            
            // Inner center dot (play button style)
            ctx.shadowColor = 'transparent';
            ctx.fillStyle = '#3b82f6';
            ctx.beginPath();
            ctx.arc(centerX, centerY, size * 0.02, 0, Math.PI * 2);
            ctx.fill();
        }

        function downloadIcon(canvasId, filename) {
            const canvas = document.getElementById(canvasId);
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                a.click();
                URL.revokeObjectURL(url);
            });
        }

        function downloadAll() {
            setTimeout(() => downloadIcon('icon192', 'icon-192x192.png'), 0);
            setTimeout(() => downloadIcon('icon512', 'icon-512x512.png'), 200);
            setTimeout(() => downloadIcon('icon192m', 'icon-192x192-maskable.png'), 400);
            setTimeout(() => downloadIcon('icon512m', 'icon-512x512-maskable.png'), 600);
        }

        // Generate all icons on load
        drawIcon('icon192', 192, false);
        drawIcon('icon512', 512, false);
        drawIcon('icon192m', 192, true);
        drawIcon('icon512m', 512, true);
    </script>
</body>
</html>
